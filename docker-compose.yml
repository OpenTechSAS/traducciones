services:
  cache:
    image: valkey/valkey:9.0.2
    volumes:
      - redis-data:/data
    restart: always

  database:
    image: postgres:18-alpine
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=weblate
      - POSTGRES_DB=weblate
    restart: always

  weblate:
    image: weblate/weblate
    depends_on:
      - cache
      - database
    volumes:
      - weblate-data:/app/data
      - weblate-cache:/app/cache
    environment:
      # Variables esenciales extraídas de tus archivos de ejemplo
      - WEBLATE_SITE_DOMAIN=${WEBLATE_SITE_DOMAIN}
      - WEBLATE_SECRET_KEY=${WEBLATE_SECRET_KEY}
      - WEBLATE_ADMIN_PASSWORD=${WEBLATE_ADMIN_PASSWORD}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=database
      - REDIS_HOST=cache
      # Estas 3 variables son las que hacían especial al archivo HTTPS
      # Son vitales para que Dokploy y Weblate se entiendan con el SSL
      - WEBLATE_ENABLE_HTTPS=1
      - WEBLATE_IP_PROXY_HEADER=HTTP_X_FORWARDED_FOR
      - WEBLATE_SECURE_PROXY_SSL_HEADER=HTTP_X_FORWARDED_PROTO,https
    restart: always

volumes:
  weblate-cache: {}
  weblate-data: {}
  postgres-data: {}
  redis-data: {}
