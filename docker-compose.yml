version: '3.8'

services:
  cache:
    image: valkey/valkey:9.0.2
    volumes:
      - redis-data:/data
    restart: always

  database:
    image: postgres:18-alpine
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=weblate
      - POSTGRES_DB=weblate
    restart: always

  weblate:
    image: weblate/weblate:latest
    depends_on:
      - cache
      - database
    volumes:
      - weblate-data:/app/data
      - weblate-cache:/app/cache
    environment:
      - WEBLATE_SITE_DOMAIN=${WEBLATE_SITE_DOMAIN}
      - WEBLATE_SECRET_KEY=${WEBLATE_SECRET_KEY}
      - WEBLATE_ADMIN_PASSWORD=${WEBLATE_ADMIN_PASSWORD}
      - WEBLATE_HTTPS_PROXY=${WEBLATE_HTTPS_PROXY}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=database
      - REDIS_HOST=cache
    restart: always

volumes:
  weblate-cache: {}
  weblate-data: {}
  postgres-data: {}
  redis-data: {}
