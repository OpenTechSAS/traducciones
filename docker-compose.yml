services:
  cache:
    image: valkey/valkey:9.0.2
    volumes:
    - redis-data:/data
    command: [valkey-server, --save, '60', '1', --loglevel, warning]
    restart: always

  database:
    image: postgres:18-alpine
    volumes:
    - postgres-data:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-weblate}
      - POSTGRES_DB=${POSTGRES_DB:-weblate}
    restart: always

  weblate:
    image: weblate/weblate
    depends_on:
    - cache
    - database
    ports:
      - 8080:8080
    volumes:
    - weblate-data:/app/data
    - weblate-cache:/app/cache
    environment:
      - WEBLATE_SITE_DOMAIN=${WEBLATE_SITE_DOMAIN}
      - WEBLATE_SECRET_KEY=${WEBLATE_SECRET_KEY}
      - WEBLATE_ADMIN_PASSWORD=${WEBLATE_ADMIN_PASSWORD}
      - WEBLATE_EMAIL_HOST=${WEBLATE_EMAIL_HOST}
      - WEBLATE_EMAIL_HOST_USER=${WEBLATE_EMAIL_HOST_USER}
      - WEBLATE_EMAIL_HOST_PASSWORD=${WEBLATE_EMAIL_HOST_PASSWORD}
      - WEBLATE_EMAIL_PORT=${WEBLATE_EMAIL_PORT:-587}
      - WEBLATE_EMAIL_TLS=${WEBLATE_EMAIL_TLS:-True}
      - WEBLATE_HTTPS_PROXY=${WEBLATE_HTTPS_PROXY:-True}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=database
      - REDIS_HOST=cache
    restart: always

volumes:
  weblate-cache: {}
  weblate-data: {}
  postgres-data: {}
  redis-data: {}
